<div class="container">
  <div class="card">
    <h2>✏️ Modifier Travailleur</h2>

    <div class="loading" *ngIf="isLoading">
      <div class="spinner"></div>
      <p>Chargement...</p>
    </div>

    <form (ngSubmit)="onSubmit()" *ngIf="!isLoading">
      <div class="form-row">
        <div class="form-group">
          <label>Nom *</label>
          <input type="text" [(ngModel)]="travailleur.nom" name="nom" required>
        </div>
        <div class="form-group">
          <label>Prénom *</label>
          <input type="text" [(ngModel)]="travailleur.prenom" name="prenom" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Email *</label>
          <input type="email" [(ngModel)]="travailleur.email" name="email" required>
        </div>
        <div class="form-group">
          <label>Téléphone</label>
          <input type="tel" [(ngModel)]="travailleur.telephone" name="telephone">
        </div>
      </div>

      <div class="form-group">
        <label>Adresse</label>
        <input type="text" [(ngModel)]="travailleur.adresse" name="adresse">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Spécialité</label>
          <select [(ngModel)]="travailleur.specialite" name="specialite">
            <option *ngFor="let s of specialites" [value]="s">{{ s }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Salaire journalier (DT)</label>
          <input type="number" [(ngModel)]="travailleur.salaireJournalier" name="salaireJournalier">
        </div>
      </div>

      <div class="form-group">
        <label>Statut</label>
        <select [(ngModel)]="travailleur.statut" name="statut">
          <option value="ACTIF">ACTIF</option>
          <option value="SUSPENDU">SUSPENDU</option>
        </select>
      </div>

      <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>
      <div class="success" *ngIf="successMessage">{{ successMessage }}</div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="router.navigate(['/travailleurs'])">Annuler</button>
        <button type="submit" class="btn-submit" [disabled]="isSaving">
          {{ isSaving ? 'Enregistrement...' : 'Enregistrer' }}
        </button>
      </div>
    </form>
  </div>
</div>
