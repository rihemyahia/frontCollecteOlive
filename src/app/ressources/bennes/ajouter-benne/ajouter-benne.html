<!-- src/app/ressources/bennes/ajouter-benne/ajouter-benne.html -->
<div class="app-layout">
  <app-sidebar [isCollapsed]="isSidebarCollapsed" (toggleSidebar)="toggleSidebar()" [userRole]="userRole"></app-sidebar>

  <main class="main-content" [class.sidebar-collapsed]="isSidebarCollapsed">
    <button class="mobile-menu-toggle" (click)="toggleSidebar()" *ngIf="isMobile">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M3 12H21M3 6H21M3 18H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

    <div class="oh-scene">
      <div class="oh-card">
        <div class="oh-card__header">
          <div class="oh-header__inner">
            <div class="oh-header__left">
              <div class="oh-brand__icon">
                <i class="bi bi-box-seam"></i>
              </div>
              <div class="oh-header__text">
                <p class="oh-header__eyebrow">AJOUT BENNE</p>
                <h2 class="oh-header__title">Créer une nouvelle benne</h2>
                <p class="header-subtitle">Ajoutez un nouveau conteneur de récolte</p>
              </div>
            </div>
          </div>
        </div>

        <div class="oh-card__body">
          <div *ngIf="successMessage" class="oh-success">
            <i class="bi bi-check-circle-fill"></i> {{ successMessage }}
          </div>
          <div *ngIf="errorMessage" class="oh-error">
            <i class="bi bi-exclamation-triangle-fill"></i> {{ errorMessage }}
          </div>

          <form [formGroup]="benneForm" (ngSubmit)="onSubmit()" class="oh-form">
            <div class="form-section">
              <h3 class="section-title">
                <i class="bi bi-info-circle"></i>
                Informations de la benne
              </h3>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Nom <span class="required">*</span></label>
                  <input type="text" 
                         class="form-control" 
                         formControlName="nom" 
                         placeholder="Ex: Benne Nord"
                         [class.is-invalid]="benneForm.get('nom')?.invalid && benneForm.get('nom')?.touched">
                  <div class="invalid-feedback" *ngIf="benneForm.get('nom')?.invalid && benneForm.get('nom')?.touched">
                    Le nom est requis
                  </div>
                </div>
                <div class="form-group">
                  <label class="form-label">Immatriculation <span class="required">*</span></label>
                  <input type="text" 
                         class="form-control" 
                         formControlName="immatriculation" 
                         placeholder="Ex: B-001"
                         [class.is-invalid]="benneForm.get('immatriculation')?.invalid && benneForm.get('immatriculation')?.touched">
                  <div class="invalid-feedback" *ngIf="benneForm.get('immatriculation')?.invalid && benneForm.get('immatriculation')?.touched">
                    L'immatriculation est requise
                  </div>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Capacité (kg) <span class="required">*</span></label>
                  <input type="number" 
                         class="form-control" 
                         formControlName="capaciteKg" 
                         placeholder="Ex: 1000"
                         [class.is-invalid]="benneForm.get('capaciteKg')?.invalid && benneForm.get('capaciteKg')?.touched">
                  <div class="invalid-feedback" *ngIf="benneForm.get('capaciteKg')?.invalid && benneForm.get('capaciteKg')?.touched">
                    La capacité doit être d'au moins 100 kg
                  </div>
                </div>
              </div>
            </div>

            <div class="form-actions">
              <button type="button" class="btn-secondary" (click)="cancel()">Annuler</button>
              <button type="submit" class="btn-primary" [disabled]="benneForm.invalid || isLoading">
                <span *ngIf="isLoading" class="spinner-border"></span>
                <i class="bi bi-save" *ngIf="!isLoading"></i>
                Ajouter la benne
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>
