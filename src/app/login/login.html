<div class="login-container" [style.backgroundImage]="'url(/olive-grove.jpg)'">
  <!-- Overlay with softer blend -->
  <div class="overlay"></div>

  <!-- Content -->
  <div class="content-wrapper">
    <!-- Transparent Card with elegant design -->
    <div class="login-card">
      <div class="card-content">
        <!-- Logo/Brand -->
        <div class="logo-section">
          <div class="logo-wrapper">
            <img src="/zitouna-logo.jpg" alt="Zitouna Logo" class="logo-image" />
          </div>
          <p class="subtitle">Système de gestion des collectes d'olives</p>
        </div>

        <!-- Form -->
        <form (ngSubmit)="onSubmit()" class="login-form">
          <!-- Email Field -->
          <div class="form-group">
            <div class="input-wrapper">
              <svg class="input-icon email-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
              </svg>
              <input
                [(ngModel)]="email"
                name="email"
                type="email"
                id="email"
                placeholder="Email"
                class="form-input"
                required
              />
            </div>
          </div>

          <!-- Password Field -->
          <div class="form-group">
  <div class="input-wrapper">

    <!-- Lock icon (FIXED COLOR) -->
    <svg class="input-icon password-icon" xmlns="http://www.w3.org/2000/svg"
      width="20" height="20" viewBox="0 0 24 24"
      fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="11" width="18" height="11" rx="2"></rect>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
    </svg>

    <!-- Input -->
    <input
      [(ngModel)]="motDePasse"
      name="motDePasse"
      [type]="showPassword ? 'text' : 'password'"
      placeholder="Mot de passe"
      class="form-input"
      required
    />

    <!-- CLEAN Animated Eye -->
    <div class="eye-container" (click)="togglePassword()">
      
      <!-- SHOW PASSWORD (eye open) -->
      <svg *ngIf="!showPassword"
        class="eye-icon"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>

      <!-- HIDE PASSWORD (eye with slash) -->
      <svg *ngIf="showPassword"
        class="eye-icon"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2">
        <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.77 21.77 0 0 1 5.06-6.94"></path>
        <path d="M1 1l22 22"></path>
      </svg>

    </div>

  </div>
</div>

          <!-- Error Message -->
          <div *ngIf="errorMessage" class="error-message">
            {{ errorMessage }}
          </div>

          <!-- Submit Button -->
          <button
            type="submit"
            [disabled]="isLoading"
            class="submit-button"
          >
            <span *ngIf="!isLoading" class="button-text">Se connecter</span>
            <svg *ngIf="isLoading" class="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </button>
        </form>
      </div>
    </div>

    <!-- Subtle floating elements with green tones -->
    <div class="float-element float-element-1"></div>
    <div class="float-element float-element-2"></div>
  </div>
</div>
