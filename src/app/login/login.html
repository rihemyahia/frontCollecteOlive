<div class="login-container">
  <div class="login-card">
    <h1> Coopérative de Sfax</h1>
    <p>Système de gestion des collectes d'olives</p>

    <form (ngSubmit)="onSubmit()">
      <input type="email" [(ngModel)]="email" name="email" placeholder="Email" required>
      <input type="password" [(ngModel)]="motDePasse" name="motDePasse" placeholder="Mot de passe" required>
      <button type="submit" [disabled]="isLoading">{{ isLoading ? 'Connexion...' : 'Se connecter' }}</button>
      <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>
    </form>
  </div>
</div>
