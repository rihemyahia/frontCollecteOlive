<div class="app-layout">
  <app-sidebar
    [isCollapsed]="isSidebarCollapsed"
    (toggleSidebar)="toggleSidebar()"
    [userRole]="userRole">
  </app-sidebar>

  <main class="main-content" [class.sidebar-collapsed]="isSidebarCollapsed">
    <button class="mobile-menu-toggle" (click)="toggleSidebar()" *ngIf="isMobile">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M3 12H21M3 6H21M3 18H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

    <div class="oh-scene">
      <div class="oh-ambient" aria-hidden="true">
        <div class="amb-orb amb-orb--1"></div>
        <div class="amb-orb amb-orb--2"></div>
        <div class="amb-orb amb-orb--3"></div>
        <div class="amb-stripe"></div>
      </div>

      <div class="oh-card">
        <div class="oh-card__glow" aria-hidden="true"></div>

        <div class="oh-card__header">
          <div class="oh-header__inner">
            <div class="oh-header__left">
              <div class="oh-brand">
                <div class="oh-brand__icon">
                  <svg viewBox="0 0 48 48" fill="none">
                    <path d="M8 40C8 40 14 18 32 13C32 13 35 27 24 34C17 38 8 40 8 40Z" fill="#A8B84B" opacity="0.9"/>
                    <circle cx="32" cy="13" r="3.5" fill="#C8D880"/>
                  </svg>
                </div>
                <div class="oh-brand__rings" aria-hidden="true">
                  <span></span><span></span>
                </div>
              </div>
              <div class="oh-header__text">
                <p class="oh-header__eyebrow">
                  <span class="eyebrow-dash"></span>
                  ADMINISTRATION
                  <span class="eyebrow-dash"></span>
                </p>
                <h2 class="oh-header__title">Modifier Utilisateur</h2>
                <p class="header-subtitle">Modifiez les informations d'un utilisateur</p>
              </div>
            </div>
          </div>
          <div class="oh-header__rule" aria-hidden="true"></div>
        </div>

        <div class="oh-card__body">
          <!-- Loading State -->
          <div *ngIf="isLoading" class="oh-state oh-state--loading">
            <div class="oh-spinner">
              <div class="oh-spinner__ring oh-spinner__ring--outer"></div>
              <div class="oh-spinner__ring oh-spinner__ring--inner"></div>
            </div>
            <p class="oh-state__desc">Chargement de l'utilisateur...</p>
          </div>

          <!-- Success Message -->
          <div *ngIf="successMessage" class="oh-success">
            <i class="bi bi-check-circle-fill me-2"></i> {{ successMessage }}
          </div>

          <!-- Error Message -->
          <div *ngIf="errorMessage" class="oh-error">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ errorMessage }}
          </div>

          <!-- Form -->
          <form (ngSubmit)="onSubmit()" *ngIf="!isLoading" class="edit-user-form">
            <div class="form-grid">
              <div class="form-group">
                <label><i class="bi bi-person"></i> Nom *</label>
                <input type="text" [(ngModel)]="utilisateur.nom" name="nom" class="form-control" placeholder="Nom de l'utilisateur" required>
              </div>
              <div class="form-group">
                <label><i class="bi bi-person"></i> Prénom *</label>
                <input type="text" [(ngModel)]="utilisateur.prenom" name="prenom" class="form-control" placeholder="Prénom de l'utilisateur" required>
              </div>
              <div class="form-group">
                <label><i class="bi bi-envelope"></i> Email *</label>
                <input type="email" [(ngModel)]="utilisateur.email" name="email" class="form-control" placeholder="email@exemple.com" required>
              </div>
              <div class="form-group">
                <label><i class="bi bi-telephone"></i> Téléphone</label>
                <input type="tel" [(ngModel)]="utilisateur.telephone" name="telephone" class="form-control" placeholder="+216 XX XXX XXX">
              </div>
              <div class="form-group full-width">
                <label><i class="bi bi-geo-alt"></i> Adresse</label>
                <input type="text" [(ngModel)]="utilisateur.adresse" name="adresse" class="form-control" placeholder="Adresse complète">
              </div>
              <div class="form-group">
                <label><i class="bi bi-briefcase"></i> Rôle</label>
                <select [(ngModel)]="utilisateur.role" name="role" class="form-control">
                  <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
                </select>
              </div>
              <div class="form-group">
                <label><i class="bi bi-toggle-on"></i> Statut</label>
                <select [(ngModel)]="utilisateur.estActif" name="estActif" class="form-control">
                  <option [value]="true">Actif</option>
                  <option [value]="false">Inactif</option>
                </select>
              </div>
            </div>

            <!-- Password Change Section -->
            <div class="password-section">
              <div class="password-header" (click)="showPasswordForm = !showPasswordForm">
                <i class="bi bi-key"></i>
                <span>Changer le mot de passe</span>
                <i class="bi" [class.bi-chevron-down]="!showPasswordForm" [class.bi-chevron-up]="showPasswordForm"></i>
              </div>

              <div class="password-form" *ngIf="showPasswordForm">
                <div class="form-group">
                  <label><i class="bi bi-key"></i> Nouveau mot de passe</label>
                  <input type="password" [(ngModel)]="passwordData.nouveauMotDePasse"
                         name="nouveauMotDePasse" class="form-control" placeholder="Minimum 6 caractères">
                  <small class="form-text">Le mot de passe doit contenir au moins 6 caractères</small>
                </div>
                <div class="form-group">
                  <label><i class="bi bi-check-circle"></i> Confirmer le mot de passe</label>
                  <input type="password" [(ngModel)]="passwordData.confirmMotDePasse"
                         name="confirmMotDePasse" class="form-control" placeholder="Confirmez le nouveau mot de passe">
                </div>
                <div class="password-actions">
                  <button type="button" class="btn-password" (click)="changePassword()" [disabled]="isChangingPassword">
                    <i class="bi bi-shield-lock"></i>
                    {{ isChangingPassword ? 'Changement...' : 'Changer le mot de passe' }}
                  </button>
                </div>
              </div>
            </div>

            <div class="form-actions">
              <button type="button" class="btn-cancel" (click)="router.navigate(['/utilisateurs'])">
                <i class="bi bi-x-circle"></i> Annuler
              </button>
              <button type="submit" class="btn-submit" [disabled]="isSaving">
                <i class="bi bi-save"></i>
                {{ isSaving ? 'Enregistrement...' : 'Enregistrer les modifications' }}
              </button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </main>
</div>
