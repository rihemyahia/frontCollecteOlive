<div class="container">
  <div class="card">
    <h2>➕ Nouvel Utilisateur</h2>

    <form (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label>Nom *</label>
          <input type="text" [(ngModel)]="utilisateur.nom" name="nom" required>
        </div>
        <div class="form-group">
          <label>Prénom *</label>
          <input type="text" [(ngModel)]="utilisateur.prenom" name="prenom" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Email *</label>
          <input type="email" [(ngModel)]="utilisateur.email" name="email" required>
        </div>
        <div class="form-group">
          <label>Téléphone</label>
          <input type="tel" [(ngModel)]="utilisateur.telephone" name="telephone">
        </div>
      </div>

      <div class="form-group">
        <label>Adresse</label>
        <input type="text" [(ngModel)]="utilisateur.adresse" name="adresse">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Rôle</label>
          <select [(ngModel)]="utilisateur.role" name="role">
            <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Statut</label>
          <select [(ngModel)]="utilisateur.estActif" name="estActif">
            <option [value]="true">Actif</option>
            <option [value]="false">Inactif</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Mot de passe *</label>
        <input type="password" [(ngModel)]="utilisateur.motDePasse" name="motDePasse" required>
      </div>

      <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>
      <div class="success" *ngIf="successMessage">{{ successMessage }}</div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="router.navigate(['/utilisateurs'])">Annuler</button>
        <button type="submit" class="btn-submit" [disabled]="isLoading">
          {{ isLoading ? 'Création...' : 'Créer' }}
        </button>
      </div>
    </form>
  </div>
</div>
