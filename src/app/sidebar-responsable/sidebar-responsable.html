<!-- src/app/sidebar-responsable/sidebar-responsable.html -->
<aside class="sidebar" [class.collapsed]="isCollapsed" [class.mobile-open]="!isCollapsed && isMobile">

  <!-- Header avec logo Olive -->
  <div class="sidebar-header">
    <div class="logo" (click)="navigate('/dashboard')">
      <div class="logo-icon">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Feuille d'olivier -->
          <path d="M28 8C28 8 32 4 38 6C38 6 34 12 30 14C26 16 22 18 18 22C14 26 10 32 8 38"
                stroke="#A8B84B" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <path d="M28 8C28 8 30 6 34 6C34 6 32 10 30 12"
                stroke="#C8D880" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          <!-- Olive -->
          <ellipse cx="20" cy="34" rx="10" ry="12" fill="#2C3A10" stroke="#1A2A0A" stroke-width="1.5"/>
          <ellipse cx="18" cy="32" rx="3" ry="4" fill="#3A4A1A" opacity="0.5"/>
          <ellipse cx="22" cy="36" rx="2" ry="3" fill="#4A5A2A" opacity="0.3"/>
          <!-- Petit reflet -->
          <ellipse cx="17" cy="30" rx="1.5" ry="2" fill="#5A6E3A" opacity="0.6"/>
        </svg>
      </div>
      <span class="logo-text" *ngIf="!isCollapsed">Zitouna</span>
    </div>
    <button class="toggle-btn" (click)="toggle()" [class.rotated]="isCollapsed">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- Profil utilisateur -->
  <div class="user-section">
    <div class="user-avatar">
      <span class="avatar-initials">{{ userProfile.avatar }}</span>
      <div class="status-dot"></div>
    </div>
    <div class="user-info" *ngIf="!isCollapsed">
      <span class="user-name">{{ userProfile.prenom }} {{ userProfile.nom }}</span>
      <span class="user-role">{{ userProfile.role }}</span>
      <span class="user-email">{{ userProfile.email }}</span>
    </div>
  </div>




  <!-- Navigation -->
  <nav class="sidebar-nav">
    <ul class="nav-list">
      <li *ngFor="let item of filteredMenuItems" class="nav-item" [class.active]="isActive(item.route)">

        <!-- Item sans enfants -->
        <a *ngIf="!item.children?.length" (click)="navigate(item.route)" class="nav-link">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none">
              <path [attr.d]="getIconPath(item.icon)" stroke="currentColor" stroke-width="1.5" fill="none"/>
            </svg>
          </span>
          <span class="nav-label" *ngIf="!isCollapsed">{{ item.label }}</span>
          <span class="nav-badge" *ngIf="item.badge && !isCollapsed">{{ item.badge }}</span>
        </a>
        

        <!-- Item avec sous-menu -->
        <div *ngIf="item.children?.length" class="nav-dropdown">
          <div class="nav-link parent" (click)="toggleMenu(item.id)">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none">
                <path [attr.d]="getIconPath(item.icon)" stroke="currentColor" stroke-width="1.5" fill="none"/>
              </svg>
            </span>
            <span class="nav-label" *ngIf="!isCollapsed">{{ item.label }}</span>
            <span class="nav-arrow" *ngIf="!isCollapsed" [class.rotated]="isMenuExpanded(item.id)">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M7 10l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </span>
          </div>
          <ul class="subnav" [class.expanded]="isMenuExpanded(item.id) && !isCollapsed">
            <li *ngFor="let child of item.children">
              <a (click)="navigate(child.route)" class="subnav-link" [class.active]="isActive(child.route)">
                <span class="subnav-icon"></span>
                <span>{{ child.label }}</span>
              </a>
            </li>
          </ul>
        </div>
      </li>
    </ul>
  </nav>

  <!-- Footer avec déconnexion -->
  <div class="sidebar-footer">
    <button class="logout-btn" (click)="logout()">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l4-4-4-4M20 12H9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span *ngIf="!isCollapsed">Déconnexion</span>
    </button>
  </div>

  <!-- Overlay pour mobile -->
  <div class="sidebar-overlay" *ngIf="isMobile && !isCollapsed" (click)="toggle()"></div>
</aside>
