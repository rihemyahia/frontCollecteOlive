<div class="app-layout">
  <app-sidebar [isCollapsed]="isSidebarCollapsed" (toggleSidebar)="toggleSidebar()" [userRole]="userRole"></app-sidebar>

  <main class="main-content" [class.sidebar-collapsed]="isSidebarCollapsed">
    <div class="oh-scene">
      <div class="oh-card">
        <div class="oh-card__header">
          <div class="oh-header__inner">
            <div class="oh-header__left">
              <div class="oh-brand__icon"><i class="bi bi-person-gear"></i></div>
              <div>
                <p class="oh-header__eyebrow">PROFIL PRESSOIR</p>
                <h2 class="oh-header__title">Mon profil</h2>
                <p class="header-subtitle">Informations personnelles, disponibilite et donnees du pressoir</p>
              </div>
            </div>
          </div>
        </div>

        <div class="oh-card__body">
          <div *ngIf="successMessage" class="oh-success"><i class="bi bi-check-circle-fill"></i>{{ successMessage }}</div>
          <div *ngIf="errorMessage" class="oh-error"><i class="bi bi-exclamation-triangle-fill"></i>{{ errorMessage }}</div>
          <div *ngIf="isLoading" class="loading-state"><div class="spinner"></div><p>Chargement du profil...</p></div>

          <form *ngIf="!isLoading" (ngSubmit)="save()">
            <div class="profile-grid">
              <div class="panel-card">
                <div class="panel-header"><h3 class="panel-title"><i class="bi bi-person"></i> Informations personnelles</h3></div>
                <div class="panel-body form-grid">
                  <div class="form-group"><label>Prenom</label><input class="form-control" [(ngModel)]="formData.prenom" name="prenom"></div>
                  <div class="form-group"><label>Nom</label><input class="form-control" [(ngModel)]="formData.nom" name="nom"></div>
                  <div class="form-group"><label>Telephone</label><input class="form-control" [(ngModel)]="formData.telephone" name="telephone"></div>
                  <div class="form-group"><label>Adresse</label><input class="form-control" [(ngModel)]="formData.adresse" name="adresse"></div>
                  <div class="form-group full-width">
                    <label><input type="checkbox" [(ngModel)]="formData.disponible" name="disponible"> Disponible</label>
                  </div>
                </div>
              </div>

              <div class="panel-card">
                <div class="panel-header"><h3 class="panel-title"><i class="bi bi-building"></i> Informations pressoir</h3></div>
                <div class="panel-body form-grid">
                  <div class="form-group"><label>Nom pressoir</label><input class="form-control" [(ngModel)]="formData.pressoirNom" name="pressoirNom"></div>
                  <div class="form-group"><label>Telephone pressoir</label><input class="form-control" [(ngModel)]="formData.pressoirTelephone" name="pressoirTelephone"></div>
                  <div class="form-group full-width"><label>Adresse pressoir</label><input class="form-control" [(ngModel)]="formData.pressoirAdresse" name="pressoirAdresse"></div>
                  <div class="form-group"><label>Email pressoir</label><input class="form-control" type="email" [(ngModel)]="formData.pressoirEmail" name="pressoirEmail"></div>
                  <div class="form-group"><label>Capacite journaliere</label><input class="form-control" [(ngModel)]="formData.capaciteJournaliere" name="capaciteJournaliere"></div>
                  <div class="form-group"><label>Horaire debut</label><input class="form-control" type="time" [(ngModel)]="formData.horaireDebut" name="horaireDebut"></div>
                  <div class="form-group"><label>Horaire fin</label><input class="form-control" type="time" [(ngModel)]="formData.horaireFin" name="horaireFin"></div>
                  <div class="form-group full-width"><label>Horaires</label><input class="form-control" [(ngModel)]="formData.horaires" name="horaires"></div>
                </div>
              </div>

              <div class="panel-card" style="grid-column: 1 / -1;">
                <div class="panel-header"><h3 class="panel-title"><i class="bi bi-geo-alt"></i> Localisation</h3></div>
                <div class="panel-body form-grid">
                  <div class="form-group"><label>Latitude</label><input class="form-control" type="number" step="0.000001" [(ngModel)]="formData.latitude" name="latitude"></div>
                  <div class="form-group"><label>Longitude</label><input class="form-control" type="number" step="0.000001" [(ngModel)]="formData.longitude" name="longitude"></div>
                </div>
              </div>
            </div>

            <div class="form-actions">
              <button class="btn-secondary" type="button" (click)="loadProfile()">Recharger</button>
              <button class="btn-primary" type="submit" [disabled]="isSaving"><i class="bi bi-save"></i> {{ isSaving ? 'Enregistrement...' : 'Enregistrer' }}</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>
